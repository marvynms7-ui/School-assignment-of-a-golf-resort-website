<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Question Page</title>
  <link href="https://fonts.googleapis.com/css2?family=Mountains+of+Christmas&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <style>
    * {
      box-sizing: border-box;
    }

    body {
      font-family: 'Mountains of Christmas', cursive;
      margin: 0;
      padding: 0;
      background-color: #fff;
      display: flex;
      flex-direction: column;
    }

    .navbar, .nav {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 20px 40px;
      background: rgba(0, 0, 0, 0.4);
      flex-wrap: wrap;
    }

    .nav a, .dropbtn {
      color: white;
      text-decoration: none;
      padding: 10px 15px;
      font-size: 1.1em;
      transition: color 0.3s ease;
    }

    .nav a:hover, .dropbtn:hover {
      color: #d3ffd3;
    }

    .dropdown {
      position: relative;
    }

    .dropdown-content {
      display: none;
      position: absolute;
      top: 100%;
      left: 0;
      background-color: #444;
      min-width: 150px;
      border-radius: 6px;
      z-index: 1;
    }

    .dropdown-content a {
      color: white;
      padding: 10px 14px;
      text-decoration: none;
      display: block;
    }

    .dropdown-content a:hover {
      background-color: #666;
    }

    .dropdown:hover .dropdown-content {
      display: block;
    }

    .header {
      width: 100%;
      height: 200px;
      background: url('last.png') center/cover no-repeat;
      display: flex;
      align-items: center;
      justify-content: center;
      position: relative;
    }

    .header .logo {
      position: absolute;
      top: 15px;
      left: 15px;
      width: 60px;
      height: 60px;
      border-radius: 50%;
    }

    .header h1 {
      color: white;
      background-color: rgba(0,0,0,0.5);
      padding: 10px 20px;
      border-radius: 10px;
    }

    .form-container {
      padding: 40px;
      text-align: center;
    }

    label {
      font-size: 1.2rem;
      display: block;
      margin-bottom: 10px;
    }

    input[type="text"],
    textarea {
      width: 100%;
      max-width: 600px;
      padding: 15px;
      border-radius: 20px;
      border: 2px solid #ccc;
      background-color: #ddd;
      font-size: 1rem;
      margin-bottom: 20px;
      font-family: 'Mountains of Christmas', cursive;
    }

    textarea {
      height: 150px;
    }

    .send-btn {
      padding: 10px 30px;
      border: none;
      background-color: #6b9b6b;
      border-radius: 20px;
      cursor: pointer;
      font-family: 'Mountains of Christmas', cursive;
    }

    .send-btn:hover {
      background-color: #cce6cc;
      transition: 0.3s;
    }

    .footer {
      background-color: #c3e6cb;
      padding: 20px;
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      justify-content: space-between;
    }

    .footer-logo img {
      height: 40px;
      border-radius: 50%;
    }

    .footer p {
      margin: 10px 0;
      font-size: 0.9rem;
    }

    .social-icons {
      display: flex;
      gap: 10px;
      margin-top: 10px;
    }

    .social-icons a {
      background-color: white;
      color: #107c10;
      font-size: 20px;
      width: 40px;
      height: 40px;
      display: flex;
      align-items: center;
      justify-content: center;
      border-radius: 50%;
      text-decoration: none;
      transition: background-color 0.3s ease, transform 0.2s ease;
    }

    .social-icons a:hover {
      background-color: #f0e68c;
      transform: scale(1.1);
      color: #333;
    }

   @media screen and (max-width: 768px) {
  .navbar {
    flex-direction: column;
    align-items: center;
    gap: 10px;
    padding: 10px 20px;
  }

  .nav {
    flex-direction: row;
    flex-wrap: wrap;
    justify-content: center;
    gap: 10px;
    width: 100%;
  }

  .nav a, .dropbtn {
    font-size: 1rem;
    padding: 8px 12px;
  }

  .dropdown-content {
    position: static;
    width: 100%;
    margin-top: 5px;
    border-radius: 5px;
  }

  .dropdown-content a {
    padding: 8px 12px;
    font-size: 0.95rem;
  }
}

@media screen and (max-width: 480px) {
  .logo h1 {
    font-size: 20px;
  }

  .logo p {
    font-size: 10px;
  }

  .form-container {
    padding: 40px 15px;
  }

  .nav a, .dropbtn {
    font-size: 0.9rem;
    padding: 6px 10px;
  }

  .send-btn {
    width: 100%;
  }
}

      .send-btn {
        width: 50%;
      }

      .social-icons a {
        width: 36px;
        height: 36px;
        font-size: 18px;
      }
    
  </style>
</head>

<body>

  <div class="header">
    <img src="logo.png" alt="Logo" class="logo">
    <h1>Question</h1>
    <nav class="nav">
      <a href="#" onclick="navigate('prset.html')">Home</a>
      <a href="#" onclick="navigate('courses.html')">Golf Courses</a>
      <a href="#" onclick="navigate('packages.html')">Packages</a>
      <a href="#" onclick="navigate('about.html')">About</a>
      <div class="dropdown">
        <a href="#" class="dropbtn">Club Houses</a>
        <div class="dropdown-content">
          <a href="proshop.html">Proshop</a>
          <a href="restaurant.html">Restaurant</a>
        </div>
      </div>
    </nav>
  </div>

  <div class="form-container">
    <label for="name">Name</label>
    <input type="text" id="name" placeholder="Type name here...">

    <label for="question">Question</label>
    <textarea id="question" placeholder="Type question here..."></textarea>

    <button class="send-btn" id="submitBtn">Send</button>
  </div>

  <div class="footer">
    <div class="footer-logo">
      <img src="logo.png" alt="Footer Logo">
    </div>
    <p><strong>HOLE IN ONE</strong><br>
      R. do Arco, 80-2 Esq<br>
      E-mail: contact@holeinonegolf.pt</p>
    <div class="social-icons">
  <a href="https://www.linkedin.com" target="_blank"><i class="fab fa-linkedin-in"></i></a>
  <a href="https://www.instagram.com" target="_blank"><i class="fab fa-instagram"></i></a>
  <a href="https://www.twitter.com" target="_blank"><i class="fab fa-twitter"></i></a>
</div>

  </div>

  <script>
    function navigate(url) {
      window.location.href = url;
    }

    document.getElementById("submitBtn").addEventListener("click", function () {
      const name = document.getElementById("name").value.trim();
      const question = document.getElementById("question").value.trim();

      if (name && question) {
        sessionStorage.setItem("formSubmitted", "true");
        window.location.href = "thanks.html";
      } else {
        alert("Please fill in all fields.");
      }
    });
  </script>

</body>
</html>
