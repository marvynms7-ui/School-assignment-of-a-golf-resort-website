
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Hole In One | Home</title>
  <link rel="stylesheet" href="prset.css" />
  <link href="https://fonts.googleapis.com/css2?family=Mountains+of+Christmas:wght@700&display=swap" rel="stylesheet">
</head>
<style>
  .welcome-text {
    margin-top: -30px;
  }
</style>

<body>
  <div class="homepage">
   
    <header class="header">
      <div class="logo-container">
        <img src="logo.png" alt="Hole In One Logo" class="logo" />
        <div class="brand-text">
          <h1>HOLE IN ONE</h1>
          <p>Elevate Your Game. Indulge Your Stay</p>
        </div>
      </div>

 
      <nav class="nav">
        <a href="#">Home</a>
        <a href="#" id="golfLink">Golf Courses</a>
        <script>
          document.getElementById("golfLink").addEventListener("click", function (e) {
            e.preventDefault();
            window.location.href = "courses.html";
          });
        </script>
        <a href="#" id="packagesLink">Packages</a>
        <script>
          
          document.getElementById("packagesLink").addEventListener("click", function (e) {
            e.preventDefault();
            window.location.href = "packages.html";
          });
        </script>
        <a href="#" id="aboutLink">About</a>
        <script>
          
  document.getElementById("aboutLink").addEventListener("click", function (e) {
    e.preventDefault();
    window.location.href = "about.html";
  });
        </script>
        <div class="dropdown">
          <a href="#" class="dropbtn">Club Houses</a>
          <div class="dropdown-content">
            <a href="proshop.html">Proshop</a>
            <a href="restaurant.html">Restaurant</a>
          </div>
        </div>
      </nav>
    </header>

 
    <div class="welcome-text" style="margin-top: -30px;">
      Welcome to Hole in One RESORT & VILLAS
    </div>
    
    <div class="cta-buttons">
      <button>Contact us</button>
      <button>Join Us</button>
      <button>Facilities</button>
    </div>
  </div>
  <script>
    document.addEventListener("DOMContentLoaded", function () {
      const buttons = document.querySelectorAll("button");
      buttons.forEach(button => {
        if (button.textContent.trim() === "Join Us") {
          button.addEventListener("click", function () {
            window.location.href = "join.html";
          });
        }
      });
    });
  </script>
  <script>
    document.addEventListener("DOMContentLoaded", function () {
      const buttons = document.querySelectorAll("button");
      buttons.forEach(button => {
        if (button.textContent.trim() === "Contact us") {
          button.addEventListener("click", function () {
            window.location.href = "contact.html";
          });
        }
      });
    });
  </script>
  <script>
    document.addEventListener("DOMContentLoaded", function () {
      const buttons = document.querySelectorAll("button");
      buttons.forEach(button => {
        if (button.textContent.trim() === "Facilities") {
          button.addEventListener("click", function () {
            window.location.href = "activities.html";
          });
        }
      });
    });
  </script>
  
  <script>
  document.addEventListener('DOMContentLoaded', function () {
    const dropdownBtn = document.querySelector('.dropbtn');
    const dropdownContent = document.querySelector('.dropdown-content');

    dropdownBtn.addEventListener('click', function (e) {
      e.preventDefault();
      dropdownContent.style.display = dropdownContent.style.display === 'flex' ? 'none' : 'flex';
    });

    // Optional: Hide dropdown when clicking outside
    document.addEventListener('click', function (e) {
      if (!dropdownBtn.contains(e.target) && !dropdownContent.contains(e.target)) {
        dropdownContent.style.display = 'none';
      }
    });
  });
</script>

<script>
  document.addEventListener("DOMContentLoaded", function () {
    const dropBtn = document.querySelector(".dropbtn");
    const dropdownContent = document.querySelector(".dropdown-content");

    function isMobile() {
      return window.innerWidth <= 768;
    }

    if (isMobile()) {
      dropBtn.addEventListener("click", function (e) {
        e.preventDefault();
        dropdownContent.style.display =
          dropdownContent.style.display === "flex" ? "none" : "flex";
      });

      document.addEventListener("click", function (e) {
        if (
          !dropBtn.contains(e.target) &&
          !dropdownContent.contains(e.target)
        ) {
          dropdownContent.style.display = "none";
        }
      });
    }
  });
</script>

  
  
</body>
</html>
