<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Join - Golf Club</title>
  <link href="https://fonts.googleapis.com/css2?family=Mountains+of+Christmas&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Mountains of Christmas', cursive;
      background: url('carts.png') no-repeat center center/cover;
      background-attachment: fixed;
      min-height: 100vh;
      color: white;
    }

    .header {
      width: 100%;
      background-color: transparent;
      padding: 10px 20px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      flex-wrap: wrap;
      position: fixed;
      top: 0;
      z-index: 999;
    }

    .logo {
      height: 40px;
    }

    .nav {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      align-items: center;
      gap: 15px;
      padding: 10px;
    }

    .nav a, .dropbtn {
      color: white;
      text-decoration: none;
      padding: 8px 12px;
      font-size: 1.1em;
      transition: color 0.3s ease;
    }

    .nav a:hover, .dropdown-content a:hover {
      color: #d3ffd3;
    }

    .dropdown {
      position: relative;
    }

    .dropdown-content {
      display: none;
      position: absolute;
      top: 100%;
      left: 0;
      background-color: #444;
      min-width: 150px;
      border-radius: 6px;
      z-index: 1;
    }

    .dropdown:hover .dropdown-content {
      display: block;
    }

    .dropdown-content a {
      color: white;
      padding: 10px 14px;
      text-decoration: none;
      display: block;
    }

    .form-wrapper {
      display: flex;
      justify-content: center;
      align-items: flex-start;
      margin-top: 140px;
      padding: 20px;
    }

    .form-container {
      background-color: rgba(0, 0, 0, 0.4);
      width: 100%;
      max-width: 600px;
      padding: 2rem;
      border-radius: 20px;
      text-align: center;
    }

    h1 {
      font-size: 2rem;
      margin-bottom: 1rem;
    }

    label {
      display: block;
      text-align: left;
      margin: 1rem 0 0.25rem 0.25rem;
      font-weight: bold;
    }

    input[type="text"] {
      width: 100%;
      padding: 0.75rem;
      border-radius: 15px;
      border: none;
      margin-bottom: 1rem;
      font-family: 'Comic Sans MS';
    }

    .name-fields {
      display: flex;
      gap: 1rem;
      flex-wrap: wrap;
    }

    .name-fields > div {
      flex: 1;
    }

    .send-btn {
      margin-top: 1rem;
      padding: 1rem;
      border: none;
      background-color: #e0e0e0;
      border-radius: 25px;
      font-size: 1.25rem;
      font-weight: bold;
      font-family: 'Comic Sans MS';
      cursor: pointer;
      width: 100%;
    }

    .send-btn:hover {
      color: #6b9b6b;
      transition: 0.3s;
    }

    

    @media (max-width: 768px) {
      .header {
        flex-direction: column;
        align-items: center;
      }

      .nav {
        flex-direction: row; /* keep horizontal on mobile */
        flex-wrap: wrap;
        justify-content: center;
      }

      .form-wrapper {
        margin-top: 160px;
        padding: 15px;
      }

      .form-container {
        padding: 1.5rem;
      }

      .name-fields {
        flex-direction: column;
      }

      h1 {
        font-size: 1.6rem;
      }
    }
  </style>
</head>
<body>

  <div class="header">
    <img src="logo.png" alt="Golf Club Logo" class="logo" />
    <nav class="nav">
      <a href="#" id="homeLink">Home</a>
      <a href="#" id="golfLink">Golf Courses</a>
      <a href="#" id="packagesLink">Packages</a>
      <a href="#" id="aboutLink">About</a>
      <div class="dropdown">
        <a href="#" class="dropbtn">Club Houses</a>
        <div class="dropdown-content">
          <a href="proshop.html">Proshop</a>
          <a href="restaurant.html">Restaurant</a>
        </div>
      </div>
    </nav>
  </div>

  <script>
    document.getElementById("homeLink").addEventListener("click", function (e) {
      e.preventDefault();
      window.location.href = "prset.html";
    });

    document.getElementById("golfLink").addEventListener("click", function (e) {
      e.preventDefault();
      window.location.href = "courses.html";
    });

    document.getElementById("packagesLink").addEventListener("click", function (e) {
      e.preventDefault();
      window.location.href = "packages.html";
    });

    document.getElementById("aboutLink").addEventListener("click", function (e) {
      e.preventDefault();
      window.location.href = "about.html";
    });
  </script>

  <div class="form-wrapper">
    <div class="form-container">
      <h1>Become a member</h1>

      <label for="dob">Date of birth</label>
      <input type="text" id="dob" name="dob" placeholder="DD/MM/YY" />
      <script>
        document.getElementById('dob').addEventListener('input', function (e) {
          let input = e.target.value.replace(/\D/g, '');
          if (input.length >= 2) input = input.slice(0, 2) + '/' + input.slice(2);
          if (input.length >= 5) input = input.slice(0, 5) + '/' + input.slice(5, 7);
          e.target.value = input.slice(0, 8);
        });
      </script>

      <div class="name-fields">
        <div>
          <label for="fname">First name</label>
          <input type="text" id="fname" name="fname" placeholder="Type first name here...">
        </div>
        <div>
          <label for="lname">Last name</label>
          <input type="text" id="lname" name="lname" placeholder="Type last name here...">
        </div>
      </div>

      <button class="send-btn" id="submitBtn">Join</button>
      <script>
        document.getElementById("submitBtn").addEventListener("click", function () {
          const dob = document.getElementById("dob").value.trim();
          const fname = document.getElementById("fname").value.trim();
          const lname = document.getElementById("lname").value.trim();

          if (dob && fname && lname) {
            sessionStorage.setItem("joinFormSubmitted", "true");
            window.location.href = "th2.html";
          } else {
            alert("Please fill in all the fields before joining.");
          }
        });
      </script>
    </div>
  </div>

 

</body>
</html>
