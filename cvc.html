<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Order Confirmation</title>
  <style>
    body {
      font-family: 'Segoe UI', sans-serif;
      background-color: #f0f8f5;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      padding: 20px;
    }

    .confirmation-box {
      background-color: #ffffff;
      padding: 40px;
      border-radius: 12px;
      box-shadow: 0 4px 15px rgba(0, 0, 0, 0.1);
      text-align: center;
      max-width: 500px;
      width: 100%;
    }

    .confirmation-box h1 {
      color: #007b5e;
      font-size: 2rem;
      margin-bottom: 20px;
    }

    .confirmation-box p {
      font-size: 1.1rem;
      color: #444;
      margin-bottom: 30px;
    }

    .confirmation-box .btn-home {
      display: inline-block;
      padding: 12px 20px;
      background-color: #007b5e;
      color: white;
      text-decoration: none;
      border-radius: 6px;
      font-weight: bold;
      transition: background-color 0.3s;
    }

    .confirmation-box .btn-home:hover {
      background-color: #005f48;
    }

    @media (max-width: 600px) {
      .confirmation-box {
        padding: 25px;
      }

      .confirmation-box h1 {
        font-size: 1.6rem;
      }

      .confirmation-box p {
        font-size: 1rem;
      }
    }
  </style>
</head>
<body>
 <div class="confirmation-box">
  <h1>Thank You!</h1>
  <p>Your order has been received.<br>Your item will be available once you arrive.</p>
  <a href="prset.html" class="btn-home">Go Back Home</a>
</div>
  </div>
</body>
</html>
