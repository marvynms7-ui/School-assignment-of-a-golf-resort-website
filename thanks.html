<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Thank You</title>
  <style>
    body {
      font-family: 'Segoe UI', sans-serif;
      background-color: #f1f9f2;
      display: flex;
      align-items: center;
      justify-content: center;
      height: 100vh;
      margin: 0;
    }
    .thank-you-box {
      background: white;
      border-radius: 16px;
      padding: 40px;
      box-shadow: 0 8px 20px rgba(0, 0, 0, 0.1);
      text-align: center;
      max-width: 400px;
      border: 1px solid #d6e8d2;
    }
    .thank-you-box img {
      width: 60px;
      margin-bottom: 20px;
    }
    .thank-you-box h1 {
      color: #6b9b6b;
      font-size: 2em;
      margin-bottom: 10px;
    }
    .thank-you-box p {
      color: #555;
      margin-bottom: 25px;
    }
    .thank-you-box a {
      display: inline-block;
      background: #388e3c;
      color: white;
      padding: 10px 24px;
      text-decoration: none;
      border-radius: 25px;
      transition:  0.3s;
    }
    .thank-you-box a:hover {
      background: #6b9b6b;
    }
  </style>
</head>
<body>
  <div class="thank-you-box">
    <img src="vintage.png" alt="Golf Icon">
    <h1>Thank You!</h1>
    <p>Your submission has been received. We'll be in touch shortly!</p>
    <a href="prset.html">Return Home</a>

  </div>
</body>
</html>
